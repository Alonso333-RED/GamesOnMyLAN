<!DOCTYPE html>
<html>
<head>
    <title>GamesOnMyLan</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<header class="header bg-primary p-3 d-flex flex-column flex-md-row align-items-center justify-content-between">

    <img src="/img/logo.png" alt="GamesOnMyLan Logo" class="logo mb-2 mb-md-0">

    <h1 class="text-primary">
        GamesOnMyLan
    </h1>

    <h1 class="text-primary ms-md-5 mt-3 mt-md-0">
        Nuevo Juego
    </h1>

    <nav class="nav">
        <a class="nav-link text-tertiary" href="/gallery">
            Galería
        </a>

        <a class="nav-link text-tertiary" href="/index">
            Inicio
        </a>
    </nav>

</header>


<main class="main-panel container mt-5">

    <form 
        action="/games" 
        method="POST" 
        enctype="multipart/form-data">


        <div class="row">


            <!-- Imagen del juego (1/3) -->
            <div class="col-md-4 mb-4 text-center">


                <img 
                    src="/img/default_game.png"
                    alt="Game Thumbnail"
                    class="thumbnail mb-3"
                    id="thumbnailPreview">


                <div>

                    <label class="form-label">
                        Imagen del juego
                    </label>


                    <input
                        type="file"
                        class="form-control"
                        name="thumbnail"
                        id="thumbnail"
                        accept=".png,.jpg,.jpeg,.webp">

                </div>


            </div>

            <div class="col-md-8">

                <h1 class="text-primary">
                    Información del juego
                </h1>

                <div class="mb-3">

                    <label class="form-label">
                        Nombre del juego
                    </label>


                    <input
                        type="text"
                        class="form-control"
                        name="game_name"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Descripción
                    </label>

                    <textarea
                        class="form-control"
                        name="game_description"
                        rows="1"></textarea>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Archivo del juego (.zip)
                    </label>

                    <input
                        type="file"
                        class="form-control"
                        name="game_zip"
                        accept=".zip"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Archivo principal
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        name="entry_file"
                        value="index.html"
                        required>

                </div>

                <button 
                    class="btn btn-primary"
                    type="submit">

                    Registrar Juego

                </button>
            </div>
        </div>
    </form>
</main>

<script src="/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
<script src="/js/newGame.js"></script>

</body>
</html>
