<!DOCTYPE html>
<html>
<head>
    <title>GamesOnMyLan</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="header bg-primary p-3 d-flex flex-column flex-md-row align-items-center justify-content-between">
        <img src="img/logo.png" alt="GamesOnMyLan Logo" class="logo mb-2 mb-md-0">
        <h1 class="text-primary">
            GamesOnMyLan
        </h1>
        <h1 class="text-primary ms-md-5 mt-3 mt-md-0">
            Perfil
        </h1>

        <nav class="nav">
            <a class="nav-link text-tertiary" href="/gallery">Galería</a>
            <a class="nav-link text-tertiary" href="/index">Inicio</a>
            <form action="/auth/logout" method="POST">
                <button class="nav-link text-tertiary" type="submit">
                    Cerrar sesión
                </button>
            </form>
        </nav>
    </header>

    <main class="main-panel container mt-5">
        <div class="d-flex flex-column flex-md-row">

            <div class="me-md-4 mb-3 mb-md-0 text-center">
                <img src="img/default_profile.png"
                    alt="Profile Image"
                    class="profile-image">
            </div>

            <div class="flex-grow-1">
                <h1 class="text-primary">
                    <span id="username"></span>
                </h1>

                <p><strong>Rol:</strong> <span id="role_name"></span></p>
                <p><strong>Fecha de registro:</strong> <span id="registered_at"></span></p>
                <p><strong>Juegos subidos:</strong> <span id="qty_games_uploaded"></span></p>
            </div>

        </div>
    </main>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
